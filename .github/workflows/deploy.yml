name: Deploy to Cloud Run

on:
  push:
    branches:
      - main        # main へのプッシュで本番デプロイ
  workflow_dispatch: # 手動実行も可

env:
  PROJECT_ID: tsukineko-grimoire-dev
  REGION: asia-northeast1          # 東京リージョン
  SERVICE_NAME: tsukineko-grimoire
  ARTIFACT_REGISTRY: asia-northeast1-docker.pkg.dev
  IMAGE_REPO: tsukineko-grimoire-dev/tsukineko-grimoire/app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation に必要

    steps:
      # ① ソースコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # ② GCP へ認証（Workload Identity Federation）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ③ Docker 用に Artifact Registry へ認証
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      # ④ Docker イメージをビルド（NEXT_PUBLIC_* をビルド引数として注入）
      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_ADMIN_EMAIL="${{ secrets.NEXT_PUBLIC_ADMIN_EMAIL }}" \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REPO }}:latest \
            .

      # ⑤ Artifact Registry へ push
      - name: Push Docker image
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REPO }}:latest

      # ⑥ Cloud Run へデプロイ
      #    サーバーサイドの秘密情報は Secret Manager から参照する
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 60 \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "GOOGLE_CLOUD_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --set-env-vars "VERTEX_AI_LOCATION=global" \
            --set-env-vars "GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" \
            --set-env-vars "VERTEX_AI_ENGINE_ID=${{ secrets.VERTEX_AI_ENGINE_ID }}" \
            --set-env-vars "VERTEX_AI_DATA_STORE_ID=${{ secrets.VERTEX_AI_DATA_STORE_ID }}" \
            --set-env-vars "ENABLE_AUTO_TRANSLATE=true" \
            --set-env-vars "ENABLE_QUERY_CACHE=true" \
            --set-env-vars "ENABLE_AUTO_COLLECTOR=false" \
            --set-env-vars "MAX_UPLOAD_SIZE_MB=100" \
            --set-env-vars "MIN_CITATION_COUNT=50" \
            --set-secrets "FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest" \
            --set-secrets "FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest" \
            --set-secrets "CRON_SECRET=CRON_SECRET:latest"

      # ⑦ デプロイ完了後に URL を表示
      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'
